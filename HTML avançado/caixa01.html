<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modelo de caixas</title>
    <style>
        h1 {
            background-color: lightgray;
            height: 300px;
            width: 300px;
            border: 6px solid darkslategray;

            /*Padding é divido em 4 partes*/

            /* padding-top: 10px;
            padding-right: 10px;
            padding-bottom: 10px;
            padding-left: 10px; */

            /*Padding é um espaçamento entre o conteúdo/escrita e a borda. Paddin é da borda para dentro*/
            /*Para configurar o padding, é recomendando que comece de cima e vá girando como um ponteiro de relógio (cima, direita, baixo, esquerda)*/

            padding: 10px 10px 10px 10px;

            margin: auto; /*Vai fazer centralizar horizontalmente*/
            /* margin-top: 10px;
            margin-right: 10px;
            margin-bottom: 25px;
            margin-left: 75px; */
            /*usado para posicionar elementos*/
            /*margin é da borda para fora*/
            /*Não é bom centralizar deste jeito*/

            /*Borda fora, fica do lado da border*/
            outline: 5px double black;
            text-align: center;
        }

        a {
            border: 4px double red;
            /*border:
            Solid - borda normal
            Dashed - linha pontilhada
            Dotted - circulos e pontilhada
            Double - duas linhas
            Groove - linha 3D*/
            display: block;
        }

        a:hover {
            border: 6px double red;
            display: block;
            font-size: 18px;
        }
    </style>
</head>
<body>
    <h1>Exemplo de caixa box-level</h1>
    <p>Parágrafos também são exemplos de box-level, mas os <a href="#">link são exemplos de caixas inline-level</a>. Vamos ver como tudo isso funciona</p>
    <!-- Quando coloca display: block, o elemento vai ser do tipo box-level-->
</body>
</html>
