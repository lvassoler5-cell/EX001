    <style>
        body {
            height: 98vh; 
            /*vh é a viewport, que é a parte branca (visível) da página, 98vh, esta falando que é 98% da viweport*/

            background-image: url('https://gustavoguanabara.github.io/html-css/imagens/mascote.png');
            border: 1px dashed black;
            background-size: 100px;
            background-repeat: no-repeat;
            background-position: center bottom;
            /*dividir em colunas e linhas, linhas para a altura (center, bottom, top) e colunas para os lados (left, center, right)*/
        }
