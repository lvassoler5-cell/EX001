<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fonts com Google Fonts</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cause:wght@100..900&display=swap');

        @import url('https://fonts.googleapis.com/css2?family=Playwrite+GB+S:ital,wght@0,100..400;1,100..400&display=swap');

        h1 {
            font-family: "Cause", cursive;
        }

        p {
            font-family: "Playwrite GB S", cursive;;
        }
    </style>
</head>
<body>

    <p>Lorem ipsum dolor sit amet consectetur adipisicing elit. Cupiditate, aliquam numquam, veritatis accusamus laudantium, similique quia dolore animi nesciunt in excepturi laborum? Maiores pariatur nostrum commodi. Commodi dolorem eos ab.</p>
</body>
</html>
