<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <link rel="shortcut icon" href="favicon.ico" type="image/x-icon">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Links</title>
</head>
<body>
    <h1>Usando links externos</h1>
    <p>Você pode acessar o meu repositório público no youtube</p>
    <a href="https://www.youtube.com/">Meu link do youtube</a> <!--a significa Âncora-->
    <p>Você também pode acessar o meu <a href="https://youtube.com/cursoemvideo/">canal gratuito no Youtube</a></p>

    <!-- rel significa Relativo a -->

    <!-- Quando a pessoa entra no link, esse link substitui a aba do meu site -->
    <p>Você também pode acessar meu link do youtube<a href="https://www.youtube.com/" target="_blank" rel="external">Meu link do youtube</a></p>
    <!-- Isso faz ele abrir em uma nova aba e deixar a do meu site aberto -->
    <!--Jeito mais recomendado com _blank-->

</body>
</html>
