<!--img-->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Images</title>
</head>
<body>
    <h1>Testando carga e Imagens</h1>
    <p>Abaixo você vai ver uma imagem que está na mesma pasta</p>
    <img src="image.png" alt="Logo HTML:5"> <!--Src significa Source/Origem e o Alt é a alternativa, caso não carregue, ele coloca um texto para explicar a imagem-->
    <!--Sempre diminuir o peso da imagem pelo tamanho-->

    <p>Podemos também carregar imagens que estão em sub-pastas</p>
    <img src="images/image2.png" alt="Logo CSS:3"> <!--images/ é o nome da pasta-->

    <p>Também podemos carregar imagens externas</p>
    <img src="https://upload.wikimedia.org/wikipedia/commons/d/dc/Javascript-shield.png" alt="Logo JavaScript">
</body>
</html>
